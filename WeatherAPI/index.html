<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="prefetch" href="http://api.weatherapi.com/v1/current.json?key=d28033b1c9ad443b8ec175055251602&q=${loc}&aqi=yes">
</head>
<body>
    <div class="container">
        <div class="weather">
            <img class="icon" src="/ImageCollection/sun-and-clouds-7942.svg" alt="sun-cloud" width="125">
            <h1>Weather</h1>
            <div class="condition"></div>
            <form class="getWeather">
                <label><input type="search" name="loc" required autofocus placeholder="Enter Location"></label>
                <button class="btn">🔍</button>
            </form>
            <div class="details"></div>
        
        </div>
    </div>

    <script>
        document.querySelector(".getWeather").addEventListener("submit",function(e){
            e.preventDefault()
            const loc=this.loc.value
            const key="d28033b1c9ad443b8ec175055251602"
            const url=`http://api.weatherapi.com/v1/current.json?key=d28033b1c9ad443b8ec175055251602&q=${loc}&aqi=yes`
            document.querySelector(".details").innerHTML=""

            fetch(url).then(i=>i.json()).then(i=>{
              if(i.error){
                document.querySelector(".details").innerHTML="<p>🙅‍♂️Location not found</p>"
              }  
              else{
                console.log(i)
                document.querySelector(".condition").innerHTML=`<img src="${i.current.condition.icon}" alt="icon"> <b>${i.current.condition.text}</b>`;
                document.querySelector(".details").innerHTML+=
                `<p><strong>Location :- <span> ${i.location.name}, ${i.location.region}</span></strong></p> <p><strong>Country :- <span> ${i.location.country}</span></strong></p> 
                <p><strong>Latitude & Longitude :- <span> ${i.location.lat} & ${i.location.lon}</span></strong></p> 
                <p><strong>Temperature :- <span> ${i.current.temp_c}*c</span></strong></p> 
                <p><strong>Feels Like :- <span> ${i.current.feelslike_c}*c</span></strong></p> 
                <p><strong>Wind Speed :- <span>${i.current.wind_kph}Km/h</span></strong></p> <p><strong>Humidity :- <span> ${i.current.humidity}%</span></strong></p> 
                <p><strong>UV Index :- <span> ${i.current.uv}</span></strong></p> <p><strong>Temperature :- <span> ${i.current.dewpoint_c}*c</span></strong></p> <p><strong>Precipitation :- <span> ${i.current.precip_mm}mm</span></strong></p> <p><strong>Pressure :- <span> ${i.current.pressure_mb}mBar</span></strong></p>`;
                
              }
            })
        })

    </script>
</body>
</html>
